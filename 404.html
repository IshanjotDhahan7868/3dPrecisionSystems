<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Precision 3D Technologies</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@400&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#f4f1eb;font-family:"Syne",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.err-code{font-family:"Cormorant Garamond",serif;font-size:clamp(100px,20vw,200px);font-weight:300;color:rgba(201,169,110,0.15);line-height:1;letter-spacing:-0.04em}
.err-title{font-family:"Cormorant Garamond",serif;font-size:clamp(28px,4vw,52px);font-weight:300;margin-bottom:16px;margin-top:-20px}
.err-title em{font-style:italic;color:#c9a96e}
.err-sub{font-family:"DM Mono",monospace;font-size:14px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(244,241,235,0.4);margin-bottom:48px}
.err-links{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.err-btn-primary{font-family:"DM Mono",monospace;font-size:13px;letter-spacing:0.2em;text-transform:uppercase;padding:16px 36px;background:#c9a96e;color:#080808;text-decoration:none;transition:opacity 0.2s}
.err-btn-primary:hover{opacity:0.85}
.err-btn-ghost{font-family:"DM Mono",monospace;font-size:13px;letter-spacing:0.2em;text-transform:uppercase;padding:16px 36px;background:transparent;color:rgba(244,241,235,0.5);text-decoration:none;border:1px solid rgba(255,255,255,0.12);transition:color 0.2s,border-color 0.2s}
.err-btn-ghost:hover{color:#c9a96e;border-color:rgba(201,169,110,0.4)}
</style>
</head>
<body>
  <div class="err-code">404</div>
  <h1 class="err-title">Page <em>not found.</em></h1>
  <p class="err-sub">That URL doesn't exist — let's get you back on track.</p>
  <div class="err-links">
    <a href="/" class="err-btn-primary">Go Home</a>
    <a href="/contact.html" class="err-btn-ghost">Get a Free Mockup</a>
  </div>
</body>
</html>
