<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="noisy"/>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8c98a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#080808;stop-opacity:1"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Grain -->
  <rect width="1200" height="630" filter="url(#grain)" opacity="0.04"/>

  <!-- Gold accent orb top-right -->
  <circle cx="1080" cy="80" r="220" fill="rgba(201,169,110,0.06)"/>
  <!-- Blue-grey orb bottom-left -->
  <circle cx="120" cy="560" r="180" fill="rgba(28,34,44,0.8)"/>

  <!-- Left gold accent bar -->
  <rect x="80" y="160" width="3" height="320" fill="url(#goldGrad)" rx="2"/>

  <!-- Brand label -->
  <text x="110" y="195" font-family="'DM Mono', monospace" font-size="13" fill="#c9a96e" letter-spacing="4" text-anchor="start" opacity="0.9">PRECISION 3D TECHNOLOGIES</text>

  <!-- Main headline -->
  <text x="110" y="300" font-family="Georgia, serif" font-size="72" font-weight="300" fill="#f4f1eb" letter-spacing="-1">Let Your Customers</text>
  <text x="110" y="385" font-family="Georgia, serif" font-size="72" font-weight="300" fill="#f4f1eb" font-style="italic" letter-spacing="-1">Close Themselves.</text>

  <!-- Subtext -->
  <text x="110" y="450" font-family="'Syne', sans-serif" font-size="22" fill="rgba(244,241,235,0.5)" letter-spacing="0">3D Product Configurators that close deals before you pick up the phone.</text>

  <!-- Stats row -->
  <rect x="110" y="490" width="1" height="60" fill="rgba(255,255,255,0.1)"/>

  <text x="130" y="515" font-family="'Syne', sans-serif" font-size="32" font-weight="700" fill="#c9a96e">3×</text>
  <text x="130" y="538" font-family="'DM Mono', monospace" font-size="11" fill="rgba(244,241,235,0.45)" letter-spacing="2">MORE LEADS</text>

  <rect x="260" y="490" width="1" height="60" fill="rgba(255,255,255,0.1)"/>

  <text x="280" y="515" font-family="'Syne', sans-serif" font-size="32" font-weight="700" fill="#c9a96e">60%+</text>
  <text x="280" y="538" font-family="'DM Mono', monospace" font-size="11" fill="rgba(244,241,235,0.45)" letter-spacing="2">CLOSE RATE</text>

  <rect x="440" y="490" width="1" height="60" fill="rgba(255,255,255,0.1)"/>

  <text x="460" y="515" font-family="'Syne', sans-serif" font-size="32" font-weight="700" fill="#c9a96e">12+</text>
  <text x="460" y="538" font-family="'DM Mono', monospace" font-size="11" fill="rgba(244,241,235,0.45)" letter-spacing="2">CONFIGURATORS SHIPPED</text>

  <!-- Right side: mockup browser frame -->
  <rect x="800" y="120" width="340" height="400" rx="12" fill="#151a20" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- Browser bar -->
  <rect x="800" y="120" width="340" height="36" rx="12" fill="#1c222c"/>
  <rect x="800" y="144" width="340" height="12" fill="#1c222c"/>
  <!-- Browser dots -->
  <circle cx="826" cy="138" r="5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="846" cy="138" r="5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="866" cy="138" r="5" fill="rgba(255,255,255,0.15)"/>
  <!-- Browser content area -->
  <rect x="812" y="168" width="316" height="332" rx="4" fill="#0f0f0f"/>
  <!-- 3D model placeholder lines -->
  <rect x="826" y="180" width="200" height="8" rx="4" fill="rgba(201,169,110,0.2)"/>
  <rect x="826" y="196" width="140" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <!-- Fake 3D shape -->
  <polygon points="970,220 1050,260 1050,340 970,380 890,340 890,260" fill="none" stroke="rgba(201,169,110,0.25)" stroke-width="1.5"/>
  <polygon points="970,220 1050,260 970,300 890,260" fill="rgba(201,169,110,0.06)"/>
  <polygon points="890,260 970,300 970,380 890,340" fill="rgba(201,169,110,0.04)"/>
  <polygon points="1050,260 970,300 970,380 1050,340" fill="rgba(201,169,110,0.08)"/>
  <!-- Option pills -->
  <rect x="826" y="400" width="50" height="20" rx="10" fill="rgba(201,169,110,0.15)" stroke="rgba(201,169,110,0.3)" stroke-width="1"/>
  <rect x="882" y="400" width="50" height="20" rx="10" fill="rgba(201,169,110,0.4)" stroke="rgba(201,169,110,0.6)" stroke-width="1"/>
  <rect x="938" y="400" width="50" height="20" rx="10" fill="rgba(201,169,110,0.15)" stroke="rgba(201,169,110,0.3)" stroke-width="1"/>
  <!-- Price line -->
  <text x="826" y="460" font-family="'Syne', sans-serif" font-size="18" font-weight="700" fill="#c9a96e">$4,850</text>
  <text x="878" y="460" font-family="'DM Mono', monospace" font-size="10" fill="rgba(244,241,235,0.4)" letter-spacing="1"> TOTAL</text>
  <!-- CTA button in mockup -->
  <rect x="826" y="470" width="140" height="26" rx="3" fill="#c9a96e"/>
  <text x="896" y="487" font-family="'Syne', sans-serif" font-size="10" font-weight="700" fill="#080808" text-anchor="middle" letter-spacing="1">GET MY QUOTE</text>

  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="rgba(201,169,110,0.06)"/>
  <rect x="0" y="610" width="1200" height="1" fill="rgba(201,169,110,0.2)"/>
  <text x="80" y="624" font-family="'DM Mono', monospace" font-size="11" fill="rgba(244,241,235,0.35)" letter-spacing="2">3DPRECISIONSYSTEMS.VERCEL.APP</text>
  <text x="1120" y="624" font-family="'DM Mono', monospace" font-size="11" fill="rgba(201,169,110,0.5)" letter-spacing="1" text-anchor="end">TORONTO, ON</text>
</svg>
